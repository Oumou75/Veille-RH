name: 🔄 Veille RH Hebdomadaire

on:
  schedule:
    - cron: "0 7 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Installer les dépendances
        run: pip install requests

      - name: 🔍 Générer la veille RH
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_veille.py

      - name: 💾 Enregistrer les données
        run: |
          git config user.name "Veille RH Bot"
          git config user.email "bot@deleev.fr"
          git add data/veille.json
          git diff --staged --quiet || git commit -m "🔄 Veille RH — $(date '+%d/%m/%Y à %H:%M')"
          git push
